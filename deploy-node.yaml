---
- name: Install node and npm
  hosts: 168.144.166.148
  tasks:
    - name: Update apt and repo and cache
      apt: update_cache=yes force_apt_get=yes cache_valid_time=3600
    - name: Install nodejs and npm
      apt:
        pkg:
          - nodejs
          - npm

- name: Create new linux user for node app
  hosts: 168.144.166.148
  tasks:
    - name: Create linux user
      user:
        # replace with your username
        name: miko
        comment: Miko Admin
        group: admin

- name: Deploy nodejs app
  hosts: 168.144.166.148
  become: True
  become_user: miko
  tasks:
    - name: copy nodejs folder to a server
      copy:
        src: nodejs-app-1.0.0.tgz
        dest: /home/miko/app-1.0.0.tgz

    - name: Unpack the nodejs file
      unarchive:
        src: /home/miko/app-1.0.0.tgz
        dest: /home/miko/
        remote_src: yes

    - name: Install dependencies
      npm:
        path: /home/miko/package

    - name: Start the application
      command:
        chdir: /home/miko/package/app
        cmd: node server
      async: 1000
      poll: 0

    - name: Ensure app is running
      shell: ps aux | grep node
      register: app_status

    - name: Show app status
      debug:
        msg: "{{ app_status.stdout_lines }}"
