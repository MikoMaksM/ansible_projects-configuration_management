---
- name: Deploy app in new namespace
  hosts: localhost
  tasks:
    - name: Create a k8s namespace
      kubernetes.core.k8s:
        name: my-app
        api_version: v1
        kind: namespace
        state: present
        kubeconfig: /Users/miko/terraform/kubeconfig_myapp-eks-cluster
    - name: Deploy nginx app 
      kubernetes.core.k8s:
        src: /Users/miko/nginx.yaml
        state: present
        kubeconfig: /Users/miko/terraform/kubeconfig_myapp-eks-cluster
        namespace: my-app

  

